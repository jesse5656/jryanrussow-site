matches:
  - trigger: ":startjr"
    replace: |
      ## Session Start — Systems Architect Discipline

      Repository:
      ~/Documents/Projects/jryanrussow-site

      The repository is the authoritative source of truth.

      Verify repository state first:

      cd ~/Documents/Projects/jryanrussow-site
      pwd
      git branch --show-current
      git status --short
      git log --oneline --decorate -5
      sed -n '1,260p' START-HERE.md
      sed -n '1,260p' docs/discipline/OPERATING-PLAN.md

      Execute the Operating Plan.

      Do not redesign architecture unless I explicitly request an Architecture Change Proposal.

      End with:
      Completed
      Current Objective
      Next Concrete Step
      Deferred

  - trigger: ":startarchive"
    replace: |
      ## Session Start — Midwest24 Archive

      Repository:
      ~/Documents/Projects/midwest24-site

      The repository is the authoritative source of truth.

      Verify repository state first:

      cd ~/Documents/Projects/midwest24-site
      pwd
      git branch --show-current
      git status --short
      git log --oneline --decorate -5
      sed -n '1,260p' START-HERE.md
      sed -n '1,260p' OPERATING-PLAN.md
      cd archive
      make test

      Execute the Current Objective from OPERATING-PLAN.md.

      Do not redesign architecture unless I explicitly request an Architecture Change Proposal.

      End with:
      Completed
      Current Objective
      Next Concrete Step
      Deferred

  - trigger: ":startops"
    replace: |
      ## Session Start — MIDWESTGuard Executive Operations

      Repository:
      ~/Documents/Projects/mwg-ops-manual

      The repository is the authoritative source of truth.

      Verify repository state first:

      cd ~/Documents/Projects/mwg-ops-manual
      pwd
      git branch --show-current
      git status --short
      git log --oneline --decorate -5
      sed -n '1,260p' START-HERE.md
      sed -n '1,260p' OPERATING-PLAN.md

      Execute the Operating Plan.

      Do not redesign operations unless I explicitly request an Operational Change Proposal.

      End with:
      Completed
      Current Objective
      Next Concrete Step
      Deferred

  - trigger: ":acp"
    replace: |
      Architecture Change Proposal

      Evaluate only. Do not implement.

      Include:
      Current State
      Problem
      Current Deficiency
      Proposed Change
      Trade-offs
      Recommendation

  - trigger: ":ocp"
    replace: |
      Operational Change Proposal

      Evaluate only. Do not implement.

      Include:
      Current State
      Problem
      Current Operational Deficiency
      Proposed Change
      Trade-offs
      Recommendation

  - trigger: ":close"
    replace: |
      Close the session.

      Provide:
      Completed
      Current Objective
      Next Concrete Step
      Deferred
