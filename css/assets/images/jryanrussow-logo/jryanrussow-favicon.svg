<svg xmlns="http://www.w3.org/2000/svg" 
     viewBox="0 0 100 100" 
     width="100" height="100">
  
  <!-- Background -->
  <rect width="100" height="100" fill="#0A2E5A" rx="6"/>
  
  <!-- Gold Border -->
  <rect x="4" y="4" width="92" height="92" 
        fill="none" 
        stroke="#D4AF37" 
        stroke-width="2" 
        rx="4"/>
  
  <!-- J Letter -->
  <text x="8" y="75" 
        font-family="Georgia, serif" 
        font-size="68" 
        font-weight="bold" 
        fill="#D4AF37">J</text>
  
  <!-- R Letter -->
  <text x="52" y="75" 
        font-family="Georgia, serif" 
        font-size="68" 
        font-weight="bold" 
        fill="#D4AF37">R</text>
  
  <!-- Corner Accent Dots -->
  <circle cx="12" cy="12" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="88" cy="12" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="12" cy="88" r="2" fill="#D4AF37" opacity="0.6"/>
  <circle cx="88" cy="88" r="2" fill="#D4AF37" opacity="0.6"/>

</svg>