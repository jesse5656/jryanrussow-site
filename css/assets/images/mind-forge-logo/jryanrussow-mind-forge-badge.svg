  <text x="300" y="440" text-anchor="middle" font-family="EB Garamond, serif" font-size="36" fill="#D4AF37" font-weight="700">MIND</text>
  <text x="300" y="480" text-anchor="middle" font-family="EB Garamond, serif" font-size="36" fill="#D4AF37" font-weight="700">FORGE</text>
  
  <!-- Name -->
  <text x="300" y="720" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" fill="#D4AF37" font-weight="700">J Ryan Russow</text>

  <title>J Ryan Russow — Mind Forge Official Badge</title>
  <desc>Official shield badge for J Ryan Russow: gold 'JR' monogram over anvil, with 'MIND FORGE' and full name below — navy background, elite branding for coaching authority.</desc>
