<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="800" fill="#0A2E5A"/>
  
  <!-- Shield outline -->
  <path d="M300 100 L100 300 L100 700 L500 700 L500 300 Z" fill="none" stroke="#D4AF37" stroke-width="6"/>
  <path d="M300 100 L300 200" stroke="#D4AF37" stroke-width="6"/>
  
  <!-- JR monogram -->
  <text x="300" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="140" fill="#D4AF37" font-weight="800">JR</text>
  
  <!-- Anvil -->
  <path d="M260 320 L340 320 L340 360 L260 360 Z M250 360 L350 360 L350 380 L250 380 Z M240 380 L360 380 L360 400 L240 400 Z" fill="none" stroke="#D4AF37" stroke-width="3"/>
  
