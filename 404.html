<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO -->
  <title>Page Not Found | J Ryan Russow</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to J Ryan Russow's site for performance coaching, wealth building, and strength training." />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://jryanrussow.com/404.html" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --navy: #0A2E5A;
      --gold: #D4AF37;
      --dark: #0F172A;
      --gray: #647481;
      --light: #F8FAFC;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--light);
      color: var(--dark);
      line-height: 1.6;
      overflow-x: hidden;
    }

    h1, h2 {
      font-family: 'EB Garamond', serif;
      font-weight: 600;
    }

    /* 404 Content Area */
    .error-wrapper {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      text-align: center;
    }

    .error-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 2rem;
    }

    .error-icon svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: var(--gold);
      stroke-width: 1.5;
      stroke-linecap: round;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -2px;
    }

    .error-title {
      font-size: 1.75rem;
      color: var(--navy);
      margin-bottom: 1rem;
    }

    .error-message {
      font-size: 1.15rem;
      color: var(--gray);
      max-width: 480px;
      margin: 0 auto 2.5rem;
    }

    .error-links {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .btn {
      display: inline-block;
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
      padding: 0.875rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 1rem;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
    }

    .btn:hover {
      background: #b89a2d;
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
    }

    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--navy);
      font-weight: 600;
      padding: 0.875rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 1rem;
      border: 2px solid var(--navy);
    }

    .btn-secondary:hover {
      background: var(--navy);
      color: white;
      transform: translateY(-3px);
    }

    @media (max-width: 768px) {
      .error-code { font-size: 4.5rem; }
      .error-title { font-size: 1.4rem; }
      .error-message { font-size: 1rem; }
      .btn, .btn-secondary { padding: 0.75rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="error-wrapper">

    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="8" x2="12" y2="12" />
        <line x1="12" y1="16" x2="12.01" y2="16" />
      </svg>
    </div>

    <p class="error-code">404</p>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-message">
      The page you're looking for doesn't exist or may have moved.
      Let's get you back on track.
    </p>

    <div class="error-links">
      <a href="index.html" class="btn">Return Home</a>
      <a href="contact.html" class="btn-secondary">Contact</a>
    </div>

  </div>

</body>
</html>
