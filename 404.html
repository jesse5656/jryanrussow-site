<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found | J Ryan Russow</title>
  <style>
    :root {
      --navy: #0A2E5A;
      --gold: #D4AF37;
      --dark: #0F172A;
      --light: #F8FAFC;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--light);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    svg {
      width: 100px; height: 100px; margin: 0 auto 2rem;
      fill: var(--gold);
    }
    h1 {
      font-size: 3rem;
      color: var(--navy);
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.25rem;
      color: var(--gray);
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block; background: var(--gold); color: var(--navy); font-weight: 700;
      padding: 0.75rem 1.75rem; border-radius: 8px; text-decoration: none;
      transition: background 0.3s;
    }
    .btn:hover { background: #b89a2d; }
    footer {
      margin-top: 4rem;
      color: var(--gray);
      font-size: 0.9rem;
    }
