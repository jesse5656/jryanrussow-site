name = "jryanrussow-site"
main = "worker.js"
compatibility_date = "2026-03-20"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
